<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacobi Iterative Solver | Dynamic n×n System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #06b6d4;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* Tabs for Input Modes */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .tab {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            color: var(--text-dim);
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .tab.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Grid for Equations */
        #equations-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .equation-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        input,
        textarea {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text);
            padding: 0.6rem 0.8rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .coeff-input {
            width: 70px;
            text-align: center;
        }

        .const-input {
            width: 90px;
            text-align: center;
            border-color: var(--secondary);
        }

        /* Textarea Mode */
        #text-mode-container {
            display: none;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            resize: vertical;
            line-height: 1.6;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .control-item label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: var(--error);
            color: white;
        }

        /* Results Table */
        .results-container {
            overflow-x: auto;
            margin-top: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem;
            color: var(--text-dim);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--border);
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
        }

        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .math-expr {
            font-family: 'Fira Code', monospace;
            color: var(--secondary);
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0.5rem;
            font-size: 0.85rem;
        }

        .var-label {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .operator {
            color: var(--primary);
            font-weight: bold;
            padding: 0 0.2rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Jacobi Iterative Solver</h1>
            <p class="subtitle">Solve linear equations using Jacobi method Developed by Muhammad Shahzaib Ramzan</p>
        </header>

        <div class="glass-card">
            <div class="section-header">
                <div class="section-title">Equation Input</div>
                <div class="tabs">
                    <div class="tab active" onclick="setMode('grid')">Grid Mode</div>
                    <div class="tab" onclick="setMode('text')">Text Mode</div>
                </div>
            </div>

            <!-- Grid Mode -->
            <div id="grid-mode-container">
                <div id="equations-container">
                    <!-- Dynamic Equations go here -->
                </div>
                <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                    <button class="btn btn-outline" onclick="addEquation()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Add Equation
                    </button>
                    <button class="btn btn-danger" onclick="removeEquation()" id="remove-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Remove
                    </button>
                </div>
            </div>

            <!-- Text Mode -->
            <div id="text-mode-container">
                <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.8rem;">
                    Enter full equations like <b>6x + y + 2z = 4</b> (one per line).
                </p>
                <textarea id="full-equations-input"
                    placeholder="6x + 1y + 2z = 4&#10;2x + 5y + 1z = 3&#10;-1x + 1y + 4z = 27"></textarea>
                <button class="btn btn-outline" style="margin-top: 1rem;" onclick="parseTextEquations()">
                    Parse to Grid
                </button>
            </div>

            <div class="controls">
                <div class="control-item">
                    <label>Max Iterations</label>
                    <input type="number" id="max-iter" value="20" style="width: 100px;">
                </div>
                <div class="control-item">
                    <label>Tolerance (ε)</label>
                    <input type="text" id="tolerance" value="0.0001" style="width: 100px;">
                </div>
                <button class="btn" id="solve-btn" onclick="solveJacobi()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    Solve System
                </button>
                <button class="btn btn-outline" onclick="resetSystem()">Reset</button>
            </div>
        </div>

        <div id="results-card" class="glass-card" style="display: none;">
            <div class="section-title">Iteration Results</div>
            <div id="dominance-warning" class="math-expr" style="display: none; color: var(--warning);">
                ⚠️ System is not strictly diagonally dominant.
            </div>
            <div class="results-container">
                <table id="iteration-table">
                    <thead id="table-head"></thead>
                    <tbody id="iteration-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let n = 3; // Number of equations/variables
        let varNames = ['x₁', 'x₂', 'x₃'];

        function setMode(mode) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('grid-mode-container').style.display = mode === 'grid' ? 'block' : 'none';
            document.getElementById('text-mode-container').style.display = mode === 'text' ? 'block' : 'none';
        }

        function renderGrid() {
            const container = document.getElementById('equations-container');
            container.innerHTML = '';

            for (let i = 0; i < n; i++) {
                const row = document.createElement('div');
                row.className = 'equation-row';

                for (let j = 0; j < n; j++) {
                    const group = document.createElement('div');
                    group.style.display = 'flex';
                    group.style.alignItems = 'center';

                    const input = document.createElement('input');
                    input.type = 'number';
                    input.className = 'coeff-input';
                    input.id = `a_${i}_${j}`;
                    input.placeholder = '0';

                    const label = document.createElement('span');
                    label.className = 'var-label';
                    label.textContent = varNames[j] || `x${j + 1}`;

                    group.appendChild(input);
                    group.appendChild(label);
                    row.appendChild(group);

                    if (j < n - 1) {
                        const op = document.createElement('span');
                        op.className = 'operator';
                        op.textContent = '+';
                        op.id = `op_${i}_${j}`;
                        op.style.cursor = 'pointer';
                        op.onclick = () => {
                            op.textContent = op.textContent === '+' ? '-' : '+';
                        };
                        row.appendChild(op);
                    }
                }

                const eq = document.createElement('span');
                eq.className = 'operator';
                eq.textContent = '=';
                row.appendChild(eq);

                const bInput = document.createElement('input');
                bInput.type = 'number';
                bInput.className = 'const-input';
                bInput.id = `b_${i}`;
                bInput.placeholder = 'b';
                row.appendChild(bInput);

                container.appendChild(row);
            }

            document.getElementById('remove-btn').disabled = n <= 2;
        }

        function addEquation() {
            n++;
            if (varNames.length < n) varNames.push(`x${n}`);
            renderGrid();
        }

        function removeEquation() {
            if (n > 2) {
                n--;
                renderGrid();
            }
        }

        function resetSystem() {
            n = 3;
            varNames = ['x₁', 'x₂', 'x₃'];
            renderGrid();
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    document.getElementById(`a_${i}_${j}`).value = 0;
                }
                document.getElementById(`b_${i}`).value = 0;
            }
            document.getElementById('results-card').style.display = 'none';
        }

        function parseTextEquations() {
            const text = document.getElementById('full-equations-input').value.trim();
            if (!text) return;

            const lines = text.split('\n').filter(l => l.trim());
            const newN = lines.length;

            // Try to extract variable names
            let detectedVars = new Set();
            lines.forEach(line => {
                const matches = line.match(/[a-zA-Z]\d*/g);
                if (matches) matches.forEach(v => detectedVars.add(v));
            });

            let sortedVars = Array.from(detectedVars).sort();
            if (sortedVars.length === 0) sortedVars = Array.from({ length: newN }, (_, i) => `x${i + 1}`);

            n = newN;
            varNames = sortedVars;
            renderGrid();

            // Populate coefficients
            lines.forEach((line, i) => {
                const parts = line.split('=');
                if (parts.length !== 2) return;

                const lhs = parts[0];
                const rhs = parseFloat(parts[1].trim());
                document.getElementById(`b_${i}`).value = rhs;

                varNames.forEach((v, j) => {
                    const regex = new RegExp(`([-+]?\\s*\\d*\\.?\\d*)\\s*${v}`, 'g');
                    const match = regex.exec(lhs);
                    if (match) {
                        let valStr = match[1].replace(/\s+/g, '');
                        let val = 1;
                        if (valStr === '' || valStr === '+') val = 1;
                        else if (valStr === '-') val = -1;
                        else val = parseFloat(valStr);

                        if (j > 0) {
                            const opEl = document.getElementById(`op_${i}_${j - 1}`);
                            if (val < 0) {
                                opEl.textContent = '-';
                                document.getElementById(`a_${i}_${j}`).value = Math.abs(val);
                            } else {
                                opEl.textContent = '+';
                                document.getElementById(`a_${i}_${j}`).value = val;
                            }
                        } else {
                            document.getElementById(`a_${i}_${j}`).value = val;
                        }
                    } else {
                        document.getElementById(`a_${i}_${j}`).value = 0;
                    }
                });
            });

            setMode('grid');
        }

        function solveJacobi() {
            const a = [];
            const b = [];
            for (let i = 0; i < n; i++) {
                const rowData = [];
                for (let j = 0; j < n; j++) {
                    let val = parseFloat(document.getElementById(`a_${i}_${j}`).value) || 0;
                    if (j > 0) {
                        const op = document.getElementById(`op_${i}_${j - 1}`).textContent;
                        if (op === '-') val = -val;
                    }
                    rowData.push(val);
                }
                a.push(rowData);
                b.push(parseFloat(document.getElementById(`b_${i}`).value) || 0);
            }

            const maxIter = parseInt(document.getElementById('max-iter').value);
            const tolerance = parseFloat(document.getElementById('tolerance').value);

            // Dominance Check
            let isDominant = true;
            for (let i = 0; i < n; i++) {
                let sum = 0;
                for (let j = 0; j < n; j++) if (i !== j) sum += Math.abs(a[i][j]);
                if (Math.abs(a[i][i]) <= sum) isDominant = false;
            }
            document.getElementById('dominance-warning').style.display = isDominant ? 'none' : 'block';

            // Setup Table Head
            const thead = document.getElementById('table-head');
            let headHtml = '<tr><th>Iter</th>';
            varNames.forEach(v => headHtml += `<th>${v}</th>`);
            headHtml += '<th>Max Error</th></tr>';
            thead.innerHTML = headHtml;

            // Solver Logic
            let x = new Array(n).fill(0);
            let x_new = new Array(n).fill(0);
            const tbody = document.getElementById('iteration-body');
            tbody.innerHTML = '';
            document.getElementById('results-card').style.display = 'block';

            addRow(0, x, '-');

            let iter = 1;
            let converged = false;
            while (iter <= maxIter && !converged) {
                let maxError = 0;
                for (let i = 0; i < n; i++) {
                    let sum = 0;
                    for (let j = 0; j < n; j++) {
                        if (i !== j) sum += a[i][j] * x[j];
                    }
                    if (a[i][i] === 0) {
                        alert(`Error: Zero on diagonal at row ${i + 1}. Jacobi method fails.`);
                        return;
                    }
                    x_new[i] = (b[i] - sum) / a[i][i];
                    maxError = Math.max(maxError, Math.abs(x_new[i] - x[i]));
                }
                x = [...x_new];
                addRow(iter, x, maxError.toFixed(3));
                if (maxError < tolerance) converged = true;
                iter++;
            }
            document.getElementById('results-card').scrollIntoView({ behavior: 'smooth' });
        }

        function addRow(iter, values, error) {
            const tbody = document.getElementById('iteration-body');
            const tr = document.createElement('tr');
            let html = `<td>${iter}</td>`;
            values.forEach(v => html += `<td>${v.toFixed(3)}</td>`);
            const badgeClass = error === '-' || parseFloat(error) > 0.01 ? 'status-warning' : 'status-success';
            html += `<td><span class="status-badge ${badgeClass}">${error}</span></td>`;
            tr.innerHTML = html;
            tbody.appendChild(tr);
        }

        window.onload = () => resetSystem();
    </script>
</body>

</html>
